repos:
# 1. Ruff (린팅 + 포맷) - 커밋 시점에 고속 실행
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
    -   id: ruff-check
        args: [ --fix ]
    -   id: ruff-format

# 2. 통합 검증 및 보안 자동화 - 푸시 시점에 심층 실행
-   repo: local
    hooks:
    -   id: bandit
        name: bandit
        entry: bandit -r src/ -ll
        language: system
        pass_filenames: false
        stages: [pre-push]

    -   id: mypy
        name: mypy
        entry: mypy src/
        language: system
        pass_filenames: false
        stages: [pre-push]

    -   id: pytest-unit
        name: pytest-unit
        entry: pytest tests/unit
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

    -   id: verify-requirements
        name: verify-requirements
        entry: python scripts/maintenance/verify_requirements.py
        language: system
        files: ^requirements/.*\.txt$
        pass_filenames: false
        stages: [pre-push]
