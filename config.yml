# config.yml
# 애플리케이션의 주요 설정을 관리하는 파일입니다.

# --- 모델 설정 ---
models:
  # 기본으로 사용할 Ollama 모델 이름
  default_ollama: "qwen3:4b-instruct-2507-q4_K_M"

  # 기본으로 사용할 임베딩 모델 이름 (Ollama 또는 HuggingFace)
  default_embedding: "nomic-embed-text"
  
  # Ollama 서버 주소 (로컬: http://127.0.0.1:11434, 도커: http://host.docker.internal:11434)
  base_url: "http://127.0.0.1:11434"

  # Ollama 모델의 토큰 생성 제한 (기본값: 4096)
  # -1로 설정하면 모델의 기본 설정 또는 무제한(컨텍스트 윈도우까지)으로 생성합니다.
  ollama_num_predict: -1

  # Ollama 모델의 온도 설정
  temperature: 0.1

  # Ollama 모델의 컨텍스트 윈도우 설정
  num_ctx: 4096

  # Ollama 모델의 탑-피 설정
  top_p: 0.8
  
  # 모델 캐시 디렉터리
  cache_dir: ".model_cache"

  # 임베딩 모델의 배치 크기
  embedding_batch_size: "auto"

  # 임베딩 모델 실행 디바이스
  embedding_device: "cuda"

  # 모델 캐시에서 유지할 모델의 최대 개수 (LRU 정책 적용)
  max_cached_models: 5

  # 최대 동시 추론 수 (VRAM 보호를 위한 전역 세마포어 값)
  max_concurrent_inference: 1


# --- RAG 파이프라인 설정 ---
rag:
  # 벡터 저장소 캐시 디렉터리
  vector_store_cache_dir: ".model_cache/vector_store_cache"
  
  # 벡터 저장소 엔진 설정 (FAISS 최적화)
  vector_store:
    engine: "faiss"
    index_params:
      hnsw_m: 32                  # HNSW 그래프 연결 수 (기본 32)
      quantization_threshold: 5000 # 5000개 이상 문서 시 SQ8 양자화 적용 (메모리 75% 절감)
      use_l2_norm: true           # 코사인 유사도 보장을 위한 L2 정규화 사용 여부
      distance_strategy: "MAX_INNER_PRODUCT"

  # 리트리버 설정
  retriever:
    search_type: "similarity"
    search_kwargs:
      k: 25  # 충분한 후보군 확보를 위해 상향
    # BM25와 FAISS의 가중치 기본값
    ensemble_weights: [0.4, 0.6]
    
    # [추가] 동적 가중치 설정 (질문 의도에 따라 자동 조절)
    dynamic_weighting:
      enabled: true
      keyword_weight: 0.8  # 키워드 중심 질문 시 BM25 비중
      semantic_weight: 0.8 # 의미 중심 질문 시 FAISS 비중
      # 키워드/의미 판단용 정규식 및 키워드 목록
      keyword_patterns: ["v?\\d+\\.\\d+(\\.\\d+)?", "[a-zA-Z]+\\d+", "0x[0-9a-fA-F]+"]
      semantic_keywords: ["차이", "작동", "이유", "철학", "설계", "구조", "개념", "설명해", "방법"]

  # 재순위화(Reranking) 설정
  reranker:
    enabled: true
    # 고속 CPU 추론을 위해 경량 모델로 교체
    model_name: "ms-marco-TinyBERT-L-2-v2" 
    top_k: 10 # 컨텍스트 풍부화
    bypass_threshold: 0.95

  # 텍스트 분할 설정
  text_splitter:
    chunk_size: 500
    chunk_overlap: 100
  
  # 추출 엔진 설정 (PyMuPDF4LLM 최적화)
  parsing:
    # --- 최적화된 추출 파라미터 (Adaptive Parsing 활성화) ---
    table_strategy: "lines_strict" # [추가] 벤치마크 결과 최적 전략
    graphics_limit: 5000           # [추가] 표 유실 방지를 위한 넉넉한 임계값
    fontsize_limit: 3        # 3pt 이하 텍스트 무시
    ignore_code: false       # 코드 블록 보존
    
    # [수정] 하이드레이션 모드 설정
    # precision_clip: 필요한 구역만 정밀 추출 (권장)
    # full: 페이지 전체 좌표 추출 (비효율적)
    # none: 좌표 추출 안 함 (하이라이트 불가)
    hydration_mode: "precision_clip" 
    
    margins: [0, 72, 0, 72]  # [추가] 상하 1인치(72pt) 마진 무시 (헤더/푸터 제거)
    write_images: false

  # 의미론적 분할 설정
  semantic_chunker:
    enabled: true
    breakpoint_threshold_type: "similarity_threshold"
    breakpoint_threshold_value: 0.6
    # 문장 분할 정규식
    sentence_split_regex: "([.!?]\\s+)" 
    min_chunk_size: 200
    max_chunk_size: 1000
    similarity_threshold: 0.6

  # 프롬프트 설정
  prompts:
    # 1. 핵심 페르소나 및 분석 원칙 (The Core Identity)
    analysis_protocol: |
      당신은 업계 최고 수준의 '문서 분석 전문가'입니다. 
      제공된 자료를 바탕으로 질문에 대해 논리적이고 정확하며 신뢰할 수 있는 답변을 생성하는 것이 당신의 사명입니다.

      <Core_Guidelines>
      1. [Language]: 사용자의 질문 언어에 맞추어 답변하십시오. (문서 언어와 무관)
      2. [Groundedness]: 제공된 <Context>를 철저히 분석하십시오. 각 컨텍스트는 [섹션: 이름] 정보를 포함하고 있습니다. 이를 통해 문서의 전체 구조 내에서의 맥락을 파악하여 답변하십시오.
      3. [Citations]: 모든 정보의 출처를 `[섹션명, p.X]` 형태로 인용하십시오. 가급적 특정 수치나 핵심 명사 바로 뒤에 붙이십시오.
      4. [Synthesis]: 흩어져 있는 정보들을 유기적으로 연결하여 질문에 대한 다각도 분석을 수행하십시오. 특히 섹션 간의 관계(원인과 결과, 실험과 결론 등)를 고려하십시오.
      </Core_Guidelines>

    # 2. 데이터 구조화 템플릿 (Data Injection)
    qa_system_prompt: "" # 분석 프로토콜로 통합하여 비워둠
    qa_human_prompt: |
      제공된 컨텍스트를 정밀 분석하여 사용자의 질문에 답변하십시오.

      <Context>
      {context}
      </Context>

      <Question>
      {input}
      </Question>

    # 3. 문서 관련성 평가 (Grading)
    grading:
      instruction: |
        당신은 엄격한 RAG 시스템의 문서 평가관입니다. 아래 제공된 문서가 사용자의 질문에 답변하기 위해 실질적인 근거를 포함하고 있는지 판단하세요.

        **판단 원칙:**
        1. 외부의 일반 상식보다 제공된 문서 내에서 정의된 텍스트와 맥락을 절대적으로 우선하여 판단하세요.
        2. 질문의 용어가 상식적인 의미와 다르더라도, 문서에서 특정 기술적 정의, 고유 명사, 혹은 모델명 등으로 정의되어 있다면 관련성이 매우 높은 것으로 간주합니다.
        3. 질문과 문서 내용 간의 용어 일치 여부를 확인할 때 대소문자 차이는 무시하십시오.
        4. 직접적인 해답이 없더라도 답변 구성을 위한 핵심 배경 정보나 정의가 포함되어 있다면 'YES'로 판단하세요.
        5. **반드시** 판단의 근거가 된 문서 내 핵심 용어(모델명, 기술적 약어, 고유 명사 등)를 추출하여 `relevant_entities` 리스트에 포함하십시오.
      template: |
        질문: {query}
        ---
        문서:
        {context_text}

    # 4. 질문 재구성 (Rewriting)
    rewriting:
      instruction: |
        사용자의 질문을 분석하여 문서 저장소(RAG)에서 더 정확한 정보를 찾을 수 있도록 구체적인 검색어로 재구성하세요.

        **작성 규칙:**
        1. 불필요한 수식어는 제거하고, 핵심 키워드와 맥락 위주로 작성하세요.
        2. 모델명, 프로젝트명, 기술적 약어 및 고유 명사는 검색의 핵심이므로 의미가 변하거나 누락되지 않도록 원형을 보존하거나 명확하게 확장하세요.
        3. 검색 엔진이 이해하기 쉬운 명사 위주의 구문으로 작성하세요.
      template: |
        원본 질문: {query}


# --- 평가(Evaluation) 설정 ---
evaluation:
  # 평가에 사용할 Ollama 모델 (Judge)
  judge_model: "qwen3:4b-instruct-2507-q4_K_M"
  # 평가 타임아웃 (초) - 로컬 모델 속도를 고려하여 넉넉히 설정
  timeout: 1200
  # 병렬 처리 수 (로컬 자원 보호를 위해 1 권장, 성능 향상을 위해 2 시도)
  max_workers: 2


# --- 캐시 보안 설정 ---
cache_security:
  security_level: "medium"
  hmac_secret: null
  trusted_paths:
    - ".model_cache"
  on_validation_failure: "regenerate"
  check_permissions: true
  expected_file_mode: 0o644
  expected_dir_mode: 0o755

# --- 전역 캐시 활성화 설정 ---
global_cache:
  # 벡터 저장소(인덱싱 결과) 캐시 사용 여부
  enable_vector_cache: false
  # LLM 답변(Response) 캐시 사용 여부
  enable_response_cache: false

# --- 채팅 UI 설정 ---
ui:
  container_height: 700
  messages:
    preparing_answer: "답변 생성 준비 중..."
    thinking: "🤔 생각을 정리하는 중입니다..."
    no_thought_process: "아직 생각 과정이 없습니다."
    no_related_info: |
      제공된 문서에서 질문에 대한 명확한 정보를 찾기 어렵습니다. 😥

      **다음을 시도해 보세요:**
      - 질문을 좀 더 명확하게 하거나 다른 키워드를 사용해 보세요.
      - 좀 더 일반적이거나 넓은 범위의 질문을 해보세요.

    sidebar_title: "⚙️ 설정"
    pdf_uploader_label: "PDF 파일 업로드"
    model_selector_label: "추론 모델 선택"
    embedding_selector_label: "임베딩 모델 선택"
    system_status_title: "시스템 상태"
    loading_models: "추론 모델 목록을 불러오는 중..."

    pdf_viewer_title: "📄 PDF 미리보기"
    pdf_viewer_no_file: "미리볼 PDF가 없습니다. 사이드바에서 파일을 업로드해주세요."
    pdf_viewer_prev_button: "← 이전"
    pdf_viewer_next_button: "다음 →"
    pdf_viewer_page_slider: "페이지 이동"
    pdf_viewer_error: "PDF를 표시하는 중 오류가 발생했습니다: {e}"

    chat_title: "💬 채팅"
    chat_input_placeholder: "PDF 내용에 대해 질문해보세요."
    chat_no_qa_system: "QA 시스템이 준비되지 않았습니다. PDF를 먼저 처리해주세요."
    chat_guide: |
      **RAG-Chat에 오신 것을 환영합니다!**

      **💡 사용 가이드**
      - **PDF 업로드:** 좌측 사이드바에서 분석하고 싶은 PDF를 업로드하세요.
      - **모델 선택:** 로컬 추론 모델을 선택할 수 있습니다.
